name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build Tauri App (Linux)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build Tauri app
        run: pnpm --filter @reqly/desktop tauri build
        continue-on-error: true
      
      - name: List build outputs
        run: |
          echo "Looking for build artifacts..."
          find apps/desktop/src-tauri/target -name "*.AppImage" -o -name "*.deb" || echo "No Tauri builds found (expected if Tauri not configured yet)"
      
      - name: Upload AppImage artifact
        if: hashFiles('apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage') != ''
        uses: actions/upload-artifact@v4
        with:
          name: reqly-linux-appimage
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  build-status:
    name: Build Status Summary
    runs-on: ubuntu-latest
    needs: [build-tauri]
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-tauri.result }}" = "success" ]; then
            echo "✅ Tauri build completed successfully"
          else
            echo "⚠️  Tauri build skipped or failed (expected if Tauri not configured yet)"
            echo "This is OK for Phase 5 initial setup"
          fi
